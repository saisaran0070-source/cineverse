<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerse — QR Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Outfit', sans-serif;
        }

        .poster {
            width: 450px;
            height: 750px;
            background: linear-gradient(180deg, #0a0e17 0%, #0d1321 30%, #111827 60%, #0a0e17 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 40px 30px;
        }

        /* Ambient glow effects */
        .poster::before {
            content: '';
            position: absolute;
            top: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .poster::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            border-radius: 50%;
        }

        .film-icon {
            font-size: 42px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px rgba(0, 245, 212, 0.5));
            z-index: 1;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            z-index: 1;
            text-shadow: 0 0 40px rgba(0, 245, 212, 0.3);
        }

        .logo .accent {
            color: #00f5d4;
            text-shadow: 0 0 30px rgba(0, 245, 212, 0.6);
        }

        .tagline {
            font-size: 15px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            margin-bottom: 35px;
            letter-spacing: 1.5px;
            z-index: 1;
        }

        .qr-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 245, 212, 0.2);
            border-radius: 20px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            box-shadow: 
                0 0 40px rgba(0, 245, 212, 0.08),
                inset 0 0 30px rgba(0, 245, 212, 0.03);
            backdrop-filter: blur(10px);
        }

        .qr-card img {
            width: 220px;
            height: 220px;
            border-radius: 12px;
            background: #fff;
            padding: 12px;
        }

        .scan-text {
            color: #00f5d4;
            font-size: 18px;
            font-weight: 600;
            margin-top: 18px;
            letter-spacing: 1px;
            z-index: 1;
            text-shadow: 0 0 20px rgba(0, 245, 212, 0.4);
        }

        .scan-icon {
            margin-right: 8px;
        }

        .features {
            display: flex;
            gap: 20px;
            margin-top: 35px;
            z-index: 1;
        }

        .feature {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feature .dot {
            width: 4px;
            height: 4px;
            background: #00f5d4;
            border-radius: 50%;
        }

        .url {
            color: #00f5d4;
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
            letter-spacing: 0.5px;
            z-index: 1;
            opacity: 0.7;
        }

        /* Print styles */
        @media print {
            body { background: #fff; }
            .poster { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="film-icon">🎬</div>
        <div class="logo">Cine<span class="accent">Verse</span></div>
        <div class="tagline">STREAM MOVIES IN EVERY LANGUAGE</div>

        <div class="qr-card">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://cineverse-sai.vercel.app/&bgcolor=ffffff&color=0a0e17&format=png" alt="Scan to visit CineVerse">
        </div>

        <div class="scan-text">
            <span class="scan-icon">📱</span> Scan to Watch
        </div>

        <div class="features">
            <span class="feature"><span class="dot"></span> Free</span>
            <span class="feature"><span class="dot"></span> HD Quality</span>
            <span class="feature"><span class="dot"></span> All Languages</span>
        </div>

        <div class="url">cineverse-sai.vercel.app</div>
    </div>
</body>
</html>
